            letter-spacing: 0.3em;

        }
        
        .loading-bar {
            width: 60px;
            height: 1px;
            background: linear-gradient(90deg, transparent, #8b7962, transparent);
            margin: 0 auto;
            animation: loadingBar 1.5s ease infinite;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes loadingBar {
            0% {
                transform: translateX(-30px);
            }
            100% {
                transform: translateX(30px);
            }
        }
        
        /* Mobile styles for loading screen */
        @media (max-width: 768px) {
